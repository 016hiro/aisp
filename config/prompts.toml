# ── LLM Prompt Templates ──
# 所有面向 LLM 的 prompt 集中管理，方便迭代调优。
# Python format 占位符用 {variable}，TOML 中无需转义。
# JSON 示例中的花括号用 {{ }} 转义（Python str.format 要求）。

[sentiment_classification]
template = """你是一个金融舆情分析专家。请对以下股票相关评论/公告进行情绪分类。

分类标签：
- bullish: 看多/利好
- bearish: 看空/利空
- neutral: 中性
- euphoric: 极度乐观（如涨停狂欢）
- panic: 恐慌（如大幅下跌恐慌）
- noise: 无关噪音

请以 JSON 数组返回，每个元素包含 id、sentiment、score（置信度0-1）、reason（简短理由）。

评论列表：
{comments_text}

返回格式：
[{{"id": 1, "sentiment": "bullish", "score": 0.85, "reason": "公告利好"}}]"""

